<script>
document.addEventListener("DOMContentLoaded", () => {
  const escapeHtml = (text) =>
    text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");

  const escapeAttribute = (text) =>
    escapeHtml(text).replace(/"/g, "&quot;");

  const slugify = (text) =>
    text
      .toLowerCase()
      .trim()
      .replace(/[^\w\s-]/g, "")
      .replace(/\s+/g, "-");

  const renderInline = (text) => {
    let html = escapeHtml(text);
    html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
    html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2">$1</a>');
    html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
    return html;
  };

  const renderMarkdown = (source) => {
    const lines = source.replace(/\r\n/g, "\n").split("\n");
    const html = [];
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];
      const trimmed = line.trim();

      if (!trimmed) {
        i += 1;
        continue;
      }

      if (trimmed.startsWith("```")) {
        const language = trimmed.slice(3).trim();
        const codeLines = [];
        i += 1;
        while (i < lines.length && !lines[i].trim().startsWith("```")) {
          codeLines.push(lines[i]);
          i += 1;
        }
        if (i < lines.length) {
          i += 1;
        }
        const className = language ? ` class="language-${escapeAttribute(language)}"` : "";
        html.push(`<pre><code${className}>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
        continue;
      }

      const headingMatch = trimmed.match(/^(#{1,6})\s+(.*)$/);
      if (headingMatch) {
        const level = headingMatch[1].length;
        const text = headingMatch[2].trim();
        const id = slugify(text);
        html.push(`<h${level} id="${escapeAttribute(id)}">${renderInline(text)}</h${level}>`);
        i += 1;
        continue;
      }

      if (/^[-*]\s+/.test(trimmed)) {
        const items = [];
        while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
          items.push(`<li>${renderInline(lines[i].trim().replace(/^[-*]\s+/, ""))}</li>`);
          i += 1;
        }
        html.push(`<ul>${items.join("")}</ul>`);
        continue;
      }

      if (/^\d+\.\s+/.test(trimmed)) {
        const items = [];
        while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) {
          items.push(`<li>${renderInline(lines[i].trim().replace(/^\d+\.\s+/, ""))}</li>`);
          i += 1;
        }
        html.push(`<ol>${items.join("")}</ol>`);
        continue;
      }

      if (/^>\s+/.test(trimmed)) {
        const quoteLines = [];
        while (i < lines.length && /^>\s+/.test(lines[i].trim())) {
          quoteLines.push(renderInline(lines[i].trim().replace(/^>\s+/, "")));
          i += 1;
        }
        html.push(`<blockquote><p>${quoteLines.join("<br>")}</p></blockquote>`);
        continue;
      }

      const paragraphLines = [];
      while (i < lines.length) {
        const current = lines[i].trim();
        if (
          !current ||
          current.startsWith("```") ||
          /^(#{1,6})\s+/.test(current) ||
          /^[-*]\s+/.test(current) ||
          /^\d+\.\s+/.test(current) ||
          /^>\s+/.test(current)
        ) {
          break;
        }
        paragraphLines.push(lines[i].trim());
        i += 1;
      }
      html.push(`<p>${renderInline(paragraphLines.join(" "))}</p>`);
    }

    return html.join("\n");
  };

  document.querySelectorAll(".markdown-playground").forEach((playground) => {
    const textarea = playground.querySelector("[data-markdown-input]");
    const preview = playground.querySelector("[data-markdown-preview]");
    const reset = playground.querySelector("[data-markdown-reset]");

    if (!textarea || !preview) {
      return;
    }

    const initialValue = textarea.value;

    const sync = () => {
      preview.innerHTML = renderMarkdown(textarea.value);
      if (window.Quarto?.typesetMath) {
        window.Quarto.typesetMath(preview);
      }
    };

    textarea.value = initialValue;
    sync();

    textarea.addEventListener("input", sync);

    if (reset) {
      reset.addEventListener("click", () => {
        textarea.value = initialValue;
        sync();
      });
    }
  });
});
</script>
